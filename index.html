<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>FineCRM 모바일 V2</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--ink:#172033;--muted:#667085;--line:#e4e9f2;--navy:#0f172a;--blue:#2563eb;--green:#0f9f6e;--red:#e11d48;--amber:#f59e0b;--shadow:0 10px 28px rgba(15,23,42,.08);--r:18px}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
    .app{max-width:980px;margin:0 auto;min-height:100dvh;padding-bottom:86px}.hero{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:18px 16px 14px;border-bottom-left-radius:24px;border-bottom-right-radius:24px;box-shadow:0 10px 30px rgba(15,23,42,.22)}
    .hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:10px}.logo{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-weight:800}.title{font-size:19px;font-weight:800;letter-spacing:-.02em}.sub{font-size:12px;color:rgba(255,255,255,.72);margin-top:2px}.ghost{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:#fff;border-radius:999px;padding:9px 12px;font-weight:700;cursor:pointer}
    .search{margin-top:14px;display:flex;gap:8px}.search input{flex:1;height:48px;border:0;border-radius:16px;padding:0 15px;font-size:16px;outline:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}.clear{width:48px;border:0;border-radius:16px;background:#fff;color:#0f172a;font-size:18px;font-weight:800;cursor:pointer}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 0}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow)}.stat b{display:block;font-size:19px}.stat span{font-size:11px;color:var(--muted)}
    .chips{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{border:1px solid var(--line);background:#fff;color:#344054;border-radius:999px;padding:9px 13px;font-size:13px;white-space:nowrap;cursor:pointer}.chip.active{background:#0f172a;color:#fff;border-color:#0f172a}
    .section-title{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px;color:#344054;font-weight:800}.section-title small{color:var(--muted);font-weight:600}.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;padding:8px 16px 20px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px}.head{display:flex;gap:11px;align-items:center}.av{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,#2563eb,#0f9f6e);font-weight:800;flex:0 0 auto}.name{font-size:15px;font-weight:850;line-height:1.25}.meta{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.35}.star{margin-left:auto;border:0;background:transparent;font-size:23px;cursor:pointer;color:#c4cad4}.star.on{color:var(--amber)}.info{border-top:1px solid var(--line);margin-top:12px;padding-top:10px}.row{display:flex;gap:8px;align-items:flex-start;font-size:13px;color:#475467;margin:7px 0;line-height:1.35;word-break:break-all}.row a{color:#344054;text-decoration:none}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:12px}.btn{height:38px;border:1px solid var(--line);border-radius:13px;background:#fff;color:#344054;font-size:12px;font-weight:800;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}.btn.call{color:var(--green);border-color:#bdebdc}.btn.mail{color:var(--blue);border-color:#c7d7fe}.btn.map{color:#7c3aed;border-color:#ddd6fe}.btn.edit{color:#475467}.empty{padding:50px 18px;text-align:center;color:var(--muted);grid-column:1/-1}.fab{position:fixed;right:18px;bottom:22px;z-index:20;width:58px;height:58px;border:0;border-radius:22px;background:linear-gradient(135deg,#2563eb,#0f172a);color:#fff;font-size:30px;box-shadow:0 18px 32px rgba(37,99,235,.35);cursor:pointer}.sheet{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:flex-end;justify-content:center;z-index:30}.sheet.show{display:flex}.panel{width:min(680px,100%);max-height:92dvh;overflow:auto;background:#fff;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px 16px 22px}.panel h3{margin:0 0 12px;font-size:20px}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field.full{grid-column:1/-1}.field label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px}.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:12px;font-size:15px;outline:none}.field textarea{min-height:72px;resize:vertical}.panel-actions{display:flex;gap:8px;margin-top:14px}.panel-actions button{flex:1;height:45px;border-radius:14px;border:1px solid var(--line);font-weight:850;cursor:pointer}.save{background:#0f172a;color:#fff}.delete{background:#fff;color:var(--red)}.cancel{background:#fff;color:#344054}.tools{display:flex;gap:8px;padding:2px 16px 6px;overflow-x:auto}.tool{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px 12px;font-size:12px;font-weight:800;color:#344054;cursor:pointer;white-space:nowrap}
    @media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.list{grid-template-columns:1fr;padding-left:12px;padding-right:12px}.form{grid-template-columns:1fr}.hero{border-bottom-left-radius:20px;border-bottom-right-radius:20px}.actions{grid-template-columns:repeat(2,1fr)}.brand .sub{max-width:220px}.panel{border-radius:24px 24px 0 0}}
  
/* === FineCRM Mobile V2: 휴대폰 전용 크게 보기 === */
html{font-size:16px;-webkit-text-size-adjust:100%}
body{min-width:0!important;overflow-x:hidden!important;background:#f3f6fb!important}
.app{width:100%!important;max-width:520px!important;margin:0 auto!important;padding-bottom:100px!important}
.hero{position:sticky!important;top:0!important;padding:18px 14px 16px!important;border-bottom-left-radius:22px!important;border-bottom-right-radius:22px!important}
.title{font-size:22px!important}.sub{font-size:13px!important}.logo{width:44px!important;height:44px!important}
.ghost{font-size:13px!important;padding:10px 12px!important}
.search input{height:54px!important;border-radius:18px!important;font-size:17px!important;padding:0 16px!important}.clear{height:54px!important;width:54px!important}
.stats{grid-template-columns:repeat(2,1fr)!important;gap:10px!important;padding:12px 12px 0!important}.stat{padding:13px!important;border-radius:18px!important}.stat b{font-size:22px!important}.stat span{font-size:12px!important}
.chips{padding:12px 12px 4px!important;gap:8px!important}.chip{font-size:14px!important;padding:10px 14px!important}
.tools{padding:8px 12px 4px!important}.tool{font-size:13px!important;padding:11px 13px!important;border-radius:14px!important}
.section-title{padding:12px 14px 6px!important;font-size:16px!important}.section-title small{font-size:13px!important}
.list{display:grid!important;grid-template-columns:1fr!important;gap:12px!important;padding:8px 12px 22px!important;width:100%!important}
.card{width:100%!important;border-radius:20px!important;padding:15px!important;box-shadow:0 8px 22px rgba(15,23,42,.08)!important}
.head{gap:12px!important}.av{width:52px!important;height:52px!important;border-radius:18px!important;font-size:15px!important}.name{font-size:18px!important;line-height:1.25!important}.meta{font-size:14px!important;line-height:1.4!important}.star{font-size:28px!important}
.info{margin-top:13px!important;padding-top:12px!important}.row{font-size:15px!important;line-height:1.45!important;margin:8px 0!important}.row span:first-child{font-size:17px!important}.row a{font-size:15px!important}
.actions{display:grid!important;grid-template-columns:repeat(2,1fr)!important;gap:9px!important;margin-top:14px!important}.btn{height:46px!important;border-radius:15px!important;font-size:14px!important}
.fab{width:62px!important;height:62px!important;right:18px!important;bottom:24px!important;border-radius:24px!important;font-size:34px!important}
.panel{width:100%!important;max-width:520px!important}.form{grid-template-columns:1fr!important}.field input,.field textarea{font-size:16px!important;padding:13px!important}
@media(min-width:521px){.app{max-width:520px!important}.list{grid-template-columns:1fr!important}}

  </style>
</head>

const KEY="finecrm_contacts_v1"; const FAV="finecrm_favs_v1"; let contacts=load(); let favorites=JSON.parse(localStorage.getItem(FAV)||"[]"); let sel="전체"; let editId=null; let favOnly=false;
function load(){const saved=localStorage.getItem(KEY); return saved?JSON.parse(saved):ORIGINAL_DATA.map((x,i)=>({...x,id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+i),memo:""}));}
function persist(){localStorage.setItem(KEY,JSON.stringify(contacts));localStorage.setItem(FAV,JSON.stringify(favorites));}
function region(addr){if(!addr)return"기타"; if(addr.includes("대전"))return"대전"; if(addr.includes("서울"))return"서울"; if(addr.includes("경기")||addr.includes("수원")||addr.includes("화성")||addr.includes("용인")||addr.includes("시흥")||addr.includes("군포")||addr.includes("안산")||addr.includes("평택")||addr.includes("안양")||addr.includes("부천")||addr.includes("김포"))return"경기"; if(addr.includes("인천"))return"인천"; if(addr.includes("충남")||addr.includes("천안")||addr.includes("아산"))return"충남"; if(addr.includes("충북")||addr.includes("청주")||addr.includes("청원"))return"충북"; if(addr.includes("경남")||addr.includes("창원")||addr.includes("진주"))return"경남"; if(addr.includes("경북")||addr.includes("구미")||addr.includes("칠곡"))return"경북"; if(addr.includes("전남")||addr.includes("나주")||addr.includes("순천")||addr.includes("영암"))return"전남"; if(addr.includes("광주"))return"광주"; if(addr.includes("대구"))return"대구"; if(addr.includes("울산"))return"울산"; if(addr.includes("부산"))return"부산"; if(addr.includes("세종"))return"세종"; if(addr.includes("제주"))return"제주"; return"기타";}
function initial(n){return (n||"?").replace(/\(주\)|㈜|주식회사/g,"").trim().slice(0,2)||"?"}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function phoneClean(p){return String(p||"").replace(/[^0-9+]/g,"");}
function makeChips(){const counts={}; REGIONS.forEach(r=>counts[r]=0); contacts.forEach(c=>{counts[region(c.addr)]++}); document.getElementById('chips').innerHTML=REGIONS.filter(r=>r==='전체'||counts[r]>0).map(r=>`<button class="chip ${sel===r?'active':''}" onclick="sel='${r}';favOnly=false;render()">${r}${r==='전체'?'':' '+counts[r]}</button>`).join('');}
function listFiltered(){const q=document.getElementById('q').value.toLowerCase().trim(); return contacts.filter(d=>{const text=(d.name+d.person+d.title+d.mobile+d.phone+d.email+d.addr+d.memo).toLowerCase(); return (sel==='전체'||region(d.addr)===sel)&&(!favOnly||favorites.includes(d.id))&&(!q||text.includes(q));}).sort((a,b)=>(a.name+a.person).localeCompare(b.name+b.person,'ko'));}
function render(){makeChips(); const list=listFiltered(); const companyCount=new Set(contacts.map(x=>x.name)).size; total.textContent=contacts.length; companies.textContent=companyCount; favCount.textContent=favorites.length; viewCount.textContent=list.length; cnt.textContent=`${list.length}명 / ${contacts.length}명`; document.getElementById('list').innerHTML=list.length?list.map(card).join(''):`<div class="empty">검색 결과가 없습니다.</div>`;}
function card(d){const tel=d.mobile||d.phone; const isFav=favorites.includes(d.id); const map=d.addr?`https://map.naver.com/p/search/${encodeURIComponent(d.addr)}`:'#'; return `<article class="card"><div class="head"><div class="av">${esc(initial(d.name))}</div><div style="min-width:0;flex:1"><div class="name">${esc(d.name)}</div><div class="meta">${esc(d.person||'담당자 미입력')}${d.title?' · '+esc(d.title):''}</div></div><button class="star ${isFav?'on':''}" onclick="toggleFav('${d.id}')">★</button></div><div class="info">${d.mobile?`<div class="row">📱 <a href="tel:${phoneClean(d.mobile)}">${esc(d.mobile)}</a></div>`:''}${d.phone?`<div class="row">☎️ <a href="tel:${phoneClean(d.phone)}">${esc(d.phone)}</a></div>`:''}${d.email?`<div class="row">✉️ <a href="mailto:${esc(d.email)}">${esc(d.email)}</a></div>`:''}${d.addr?`<div class="row">📍 <a target="_blank" href="${map}">${esc(d.addr)}</a></div>`:''}${d.memo?`<div class="row">📝 <span>${esc(d.memo)}</span></div>`:''}</div><div class="actions">${tel?`<a class="btn call" href="tel:${phoneClean(tel)}">전화</a>`:'<span></span>'}${d.email?`<a class="btn mail" href="mailto:${esc(d.email)}">메일</a>`:'<span></span>'}${d.addr?`<a class="btn map" target="_blank" href="${map}">지도</a>`:'<span></span>'}<button class="btn edit" onclick="openForm('${d.id}')">수정</button></div></article>`}
function toggleFav(id){favorites=favorites.includes(id)?favorites.filter(x=>x!==id):[...favorites,id];persist();render();}
function filterFav(){favOnly=!favOnly; sel='전체'; render();}
function openForm(id=null){editId=id; formTitle.textContent=id?'명함 수정':'명함 추가'; delBtn.style.display=id?'block':'none'; const d=id?contacts.find(x=>x.id===id):{}; ['name','person','title','mobile','phone','email','addr','memo'].forEach(k=>document.getElementById('f_'+k).value=d?.[k]||''); sheet.classList.add('show');}
function closeForm(){sheet.classList.remove('show'); editId=null;}
function saveContact(){const d={id:editId|| (crypto.randomUUID?crypto.randomUUID():String(Date.now())), name:f_name.value.trim(), person:f_person.value.trim(), title:f_title.value.trim(), mobile:f_mobile.value.trim(), phone:f_phone.value.trim(), email:f_email.value.trim(), addr:f_addr.value.trim(), memo:f_memo.value.trim()}; if(!d.name&&!d.person){alert('업체명 또는 담당자는 입력해야 합니다.');return;} if(editId){contacts=contacts.map(x=>x.id===editId?d:x)}else{contacts.unshift(d)} persist(); closeForm(); render();}
function deleteContact(){if(!editId)return; if(confirm('삭제할까요?')){contacts=contacts.filter(x=>x.id!==editId); favorites=favorites.filter(x=>x!==editId); persist(); closeForm(); render();}}
function resetData(){if(confirm('추가/수정한 내용을 지우고 처음 데이터로 되돌릴까요?')){localStorage.removeItem(KEY);localStorage.removeItem(FAV);contacts=load();favorites=[];sel='전체';favOnly=false;render();}}
function exportCSV(){const cols=['name','person','title','mobile','phone','email','addr','memo']; const csv='\ufeff'+cols.join(',')+'\n'+contacts.map(r=>cols.map(c=>'"'+String(r[c]||'').replace(/"/g,'""')+'"').join(',')).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download='FineCRM_contacts.csv'; a.click();}
async function copyBackup(){const text=JSON.stringify(contacts,null,2); try{await navigator.clipboard.writeText(text); alert('백업 데이터가 복사되었습니다. 메모장에 붙여넣어 보관하세요.');}catch(e){prompt('아래 백업 데이터를 복사하세요',text);}}
render();
</script>
</body>
</html>
