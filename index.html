<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>FineCRM 모바일 V2</title>
<style>
:root {
  --bg:#f4f7fb; --card:#fff; --ink:#111827; --muted:#6b7280; --line:#e5e7eb;
  --navy:#0f172a; --blue:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#f59e0b;
  --shadow:0 8px 24px rgba(15,23,42,.08); --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Segoe UI,sans-serif;font-size:16px}
body{padding-bottom:82px}
.header{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;padding:18px 16px 14px;border-bottom-left-radius:24px;border-bottom-right-radius:24px;box-shadow:var(--shadow)}
.h-title{font-size:22px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;justify-content:space-between}
.h-sub{opacity:.78;font-size:13px;margin-top:4px}
.search{margin-top:14px;display:flex;gap:8px}
.search input{width:100%;height:48px;border:0;border-radius:15px;padding:0 16px;font-size:16px;outline:none;background:#fff;color:#111827}
.iconbtn{width:48px;height:48px;border:0;border-radius:15px;background:rgba(255,255,255,.16);color:#fff;font-size:22px}
.wrap{padding:14px 12px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border:1px solid var(--line);border-radius:15px;padding:10px;text-align:center;box-shadow:0 3px 10px rgba(15,23,42,.04)}
.stat b{display:block;font-size:19px;color:#0f172a}.stat span{font-size:12px;color:var(--muted)}
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin-bottom:4px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-size:14px;color:#374151;box-shadow:0 2px 8px rgba(15,23,42,.04)}
.chip.active{background:#0f172a;color:#fff;border-color:#0f172a}
.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 10px;color:#374151;font-size:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px;box-shadow:var(--shadow)}
.cardTop{display:flex;gap:12px;align-items:flex-start}
.avatar{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex:0 0 auto}
.main{min-width:0;flex:1}
.company{font-size:18px;font-weight:800;line-height:1.25;letter-spacing:-.4px;word-break:keep-all}
.person{font-size:15px;color:#374151;margin-top:4px;line-height:1.35}
.addr{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.45}
.meta{font-size:14px;color:#111827;margin-top:8px;line-height:1.55}
.memo{font-size:13px;margin-top:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:8px;color:#475569;line-height:1.4}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:13px}
.btn{height:42px;border:0;border-radius:13px;font-size:14px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;color:#fff;gap:4px}
.call{background:#16a34a}.mail{background:#2563eb}.map{background:#7c3aed}.edit{background:#475569}
.star{border:0;background:transparent;color:#cbd5e1;font-size:26px;line-height:1;margin-top:-4px}.star.on{color:#f59e0b}
.fab{position:fixed;right:18px;bottom:88px;width:58px;height:58px;border:0;border-radius:22px;background:#0f172a;color:#fff;font-size:32px;box-shadow:0 12px 30px rgba(15,23,42,.25);z-index:30}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);height:70px;z-index:25;box-shadow:0 -8px 22px rgba(15,23,42,.08)}
.tab{border:0;background:#fff;color:#64748b;font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}.tab b{font-size:22px}.tab.active{color:#0f172a}
.empty{padding:45px 20px;text-align:center;color:var(--muted)}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.48);display:none;align-items:flex-end;z-index:50}.modal.show{display:flex}
.sheet{background:#fff;width:100%;max-height:92vh;overflow:auto;border-top-left-radius:26px;border-top-right-radius:26px;padding:18px 16px 24px;box-shadow:0 -12px 35px rgba(0,0,0,.18)}
.sheet h3{margin:0 0 12px;font-size:20px}.gridForm{display:grid;gap:9px}
.gridForm input,.gridForm textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:13px;font-size:16px;outline:none;background:#f8fafc}
.gridForm textarea{min-height:78px;resize:vertical}
.formBtns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.save{background:#0f172a}.cancel{background:#64748b}.delete{background:#dc2626;grid-column:1/-1}
@media (min-width:720px){.wrap{max-width:720px;margin:0 auto}.header{max-width:720px;margin:0 auto}}
</style>
</head>
<body>
<header class="header">
  <div class="h-title"><span>📇 FineCRM</span></div>
  <div class="search"><input id="q" placeholder="업체명, 담당자, 전화, 이메일 검색"><button class="iconbtn" id="clearBtn">×</button></div>
</header>
<main class="wrap">
  <div class="stats"><div class="stat"><b id="totalN">0</b><span>전체</span></div><div class="stat"><b id="viewN">0</b><span>검색결과</span></div><div class="stat"><b id="favN">0</b><span>즐겨찾기</span></div></div>
  <div class="filters" id="filters"></div>
  <div class="sectionTitle"><span id="modeTitle">전체 거래처</span><span id="hint">카드를 눌러 수정</span></div>
  <section id="list"></section>
</main>
<button class="fab" id="addBtn">+</button>
<nav class="bottom">
  <button class="tab active" data-mode="all"><b>🏠</b>전체</button>
  <button class="tab" data-mode="fav"><b>⭐</b>즐겨찾기</button>
  <button class="tab" data-mode="recent"><b>🕘</b>최근</button>
  <button class="tab" data-mode="backup"><b>📤</b>백업</button>
</nav>
<div class="modal" id="modal"><div class="sheet">
  <h3 id="modalTitle">명함 등록</h3>
  <div class="gridForm">
    <input id="f_name" placeholder="회사명 *"><input id="f_person" placeholder="담당자"><input id="f_title" placeholder="직급 / 부서">
    <input id="f_mobile" placeholder="휴대폰"><input id="f_phone" placeholder="대표전화"><input id="f_email" placeholder="이메일"><input id="f_addr" placeholder="주소">
    <textarea id="f_memo" placeholder="메모"></textarea>
  </div>
  <div class="formBtns"><button class="btn save" id="saveBtn">저장</button><button class="btn cancel" id="closeBtn">취소</button><button class="btn delete" id="deleteBtn">삭제</button></div>
</div></div>

const REGIONS=["전체","대전","서울","경기","인천","충남","충북","경남","경북","전남","전북","대구","울산","부산","광주","세종","제주","기타"];
const COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FAECE7','#712B13'],['#FBEAF0','#72243E'],['#FAEEDA','#633806'],['#EAF3DE','#27500A'],['#EEEDFE','#3C3489']];
let contacts=load(); let sel='전체'; let mode='all'; let editId=null;
function load(){try{const saved=localStorage.getItem('finecrm_contacts_v2'); if(saved){const parsed=JSON.parse(saved); if(Array.isArray(parsed)&&parsed.length>0)return parsed;}}catch(e){} return SEED.map((x,i)=>({...x,id:'seed_'+i,fav:false,memo:'',updated:Date.now()-i}));}
function saveAll(){localStorage.setItem('finecrm_contacts_v2',JSON.stringify(contacts));}
function region(addr){if(!addr)return'기타'; if(addr.includes('대전'))return'대전'; if(addr.includes('서울'))return'서울'; if(addr.includes('경기')||addr.includes('수원')||addr.includes('화성')||addr.includes('용인')||addr.includes('시흥')||addr.includes('군포')||addr.includes('안산')||addr.includes('평택')||addr.includes('안양')||addr.includes('부천')||addr.includes('김포'))return'경기'; if(addr.includes('인천'))return'인천'; if(addr.includes('충남')||addr.includes('천안')||addr.includes('아산'))return'충남'; if(addr.includes('충북')||addr.includes('청주')||addr.includes('청원'))return'충북'; if(addr.includes('경남')||addr.includes('창원')||addr.includes('진주'))return'경남'; if(addr.includes('경북')||addr.includes('구미')||addr.includes('칠곡'))return'경북'; if(addr.includes('전남')||addr.includes('나주')||addr.includes('순천')||addr.includes('영암'))return'전남'; if(addr.includes('광주'))return'광주'; if(addr.includes('대구'))return'대구'; if(addr.includes('울산'))return'울산'; if(addr.includes('부산'))return'부산'; if(addr.includes('세종'))return'세종'; if(addr.includes('제주'))return'제주'; return'기타';}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function initial(n){return (n||'?').replace(/[(주)㈜주식회사\s]/g,'').slice(0,2)||'?';}
function color(n){let sum=[...(n||'')].reduce((a,c)=>a+c.charCodeAt(0),0);return COLORS[sum%COLORS.length];}
function filtered(){let q=document.getElementById('q').value.trim().toLowerCase(); let arr=contacts.filter(d=>(sel==='전체'||region(d.addr)===sel)); if(mode==='fav')arr=arr.filter(d=>d.fav); if(mode==='recent')arr=[...arr].sort((a,b)=>(b.updated||0)-(a.updated||0)).slice(0,30); if(q)arr=arr.filter(d=>(d.name+d.person+d.title+d.mobile+d.phone+d.email+d.addr+d.memo).toLowerCase().includes(q)); return arr;}
function drawFilters(){let counts={};REGIONS.forEach(r=>counts[r]=0); contacts.forEach(d=>{let r=region(d.addr); counts[r]=(counts[r]||0)+1;}); document.getElementById('filters').innerHTML=REGIONS.filter(r=>r==='전체'||counts[r]>0).map(r=>`<button class="chip ${sel===r?'active':''}" onclick="sel='${r}';render()">${r}${r!=='전체'?' '+counts[r]:''}</button>`).join('');}
function render(){drawFilters(); let arr=filtered(); document.getElementById('totalN').textContent=contacts.length; document.getElementById('viewN').textContent=arr.length; document.getElementById('favN').textContent=contacts.filter(x=>x.fav).length; document.getElementById('modeTitle').textContent=mode==='fav'?'즐겨찾기':mode==='recent'?'최근 수정/연락':'전체 거래처'; if(!arr.length){document.getElementById('list').innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
 document.getElementById('list').innerHTML=arr.map(d=>{let [bg,tx]=color(d.name); let map='https://map.naver.com/v5/search/'+encodeURIComponent(d.addr||d.name); return `<article class="card" onclick="openForm('${d.id}')"><div class="cardTop"><div class="avatar" style="background:${bg};color:${tx}">${esc(initial(d.name))}</div><div class="main"><div class="company">${esc(d.name)}</div><div class="person">${esc(d.person||'담당자 없음')}${d.title?' · '+esc(d.title):''}</div>${d.addr?`<div class="addr">📍 ${esc(d.addr)}</div>`:''}<div class="meta">${d.mobile?`📱 ${esc(d.mobile)}<br>`:''}${d.phone?`☎ ${esc(d.phone)}<br>`:''}${d.email?`✉ ${esc(d.email)}`:''}</div>${d.memo?`<div class="memo">📝 ${esc(d.memo)}</div>`:''}</div><button class="star ${d.fav?'on':''}" onclick="event.stopPropagation();toggleFav('${d.id}')">★</button></div><div class="actions" onclick="event.stopPropagation()">${d.mobile?`<a class="btn call" href="tel:${d.mobile}">전화</a>`:`<span></span>`}${d.email?`<a class="btn mail" href="mailto:${d.email}">메일</a>`:`<span></span>`}<a class="btn map" href="${map}" target="_blank">지도</a><button class="btn edit" onclick="openForm('${d.id}')">수정</button></div></article>`}).join('');}
function toggleFav(id){let d=contacts.find(x=>x.id===id); if(d){d.fav=!d.fav;d.updated=Date.now();saveAll();render();}}
function openForm(id=null){editId=id; let d=id?contacts.find(x=>x.id===id):{}; document.getElementById('modalTitle').textContent=id?'명함 수정':'명함 등록'; ['name','person','title','mobile','phone','email','addr','memo'].forEach(k=>document.getElementById('f_'+k).value=d[k]||''); document.getElementById('deleteBtn').style.display=id?'flex':'none'; document.getElementById('modal').classList.add('show');}
function closeForm(){document.getElementById('modal').classList.remove('show');}
function saveForm(){let d={name:f_name.value.trim(),person:f_person.value.trim(),title:f_title.value.trim(),mobile:f_mobile.value.trim(),phone:f_phone.value.trim(),email:f_email.value.trim(),addr:f_addr.value.trim(),memo:f_memo.value.trim(),updated:Date.now()}; if(!d.name){alert('회사명은 꼭 입력하세요.');return;} if(editId){let i=contacts.findIndex(x=>x.id===editId);contacts[i]={...contacts[i],...d};} else {contacts.unshift({...d,id:'new_'+Date.now(),fav:false});} saveAll();closeForm();render();}
function deleteForm(){if(!editId)return; if(confirm('이 명함을 삭제할까요?')){contacts=contacts.filter(x=>x.id!==editId);saveAll();closeForm();render();}}
function exportCSV(){
  let header=['회사명','담당자','직급','휴대폰','전화','이메일','주소','메모'];
  let rows=contacts.map(d=>[d.name,d.person,d.title,d.mobile,d.phone,d.email,d.addr,d.memo].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  let csv='\ufeff'+header.join(',')+'\n'+rows.join('\n');
  let blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='FineCRM_주소록.csv';
  a.click();
}
document.getElementById('q').addEventListener('input',render);document.getElementById('clearBtn').onclick=()=>{q.value='';render();};document.getElementById('addBtn').onclick=()=>openForm();document.getElementById('closeBtn').onclick=closeForm;document.getElementById('saveBtn').onclick=saveForm;document.getElementById('deleteBtn').onclick=deleteForm;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeForm();});document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');mode=t.dataset.mode;if(mode==='backup'){exportCSV();mode='all';document.querySelector('.tab[data-mode="all"]').classList.add('active');t.classList.remove('active');}render();});render();
</script>
